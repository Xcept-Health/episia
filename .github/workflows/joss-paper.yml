name: "paper"
on:
  push:
    paths:
      - paper.md
      - paper.bib

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker://pandoc/core:latest
        with:
          args: >-
            --standalone
            paper.md
            -o paper.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf